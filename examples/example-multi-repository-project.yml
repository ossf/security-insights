# Project and repository template for a multi-repository project
# This file would be stored in the https://example.com/foobar/foo repository
# and addressable via https://example.com/foobar/foo/security-insights.yml
header:
  schema-version: 2.2.0
  last-updated: '2025-03-01'
  last-reviewed: '2025-04-01'
  url: https://example.com/foo/bar/raw/branch/main/security-insights.yml
  comment: |
    This is the parent file for a multi-repository project: it contains the
    project section, plus a repository section describing its own repository.
    Other repositories in the project should publish child files (see
    example-multi-repository-project-reuse.yml) that omit the project section
    and set header.project-si-source to the raw URL of this file.

project:
  name: FooBar
  administrators:
    - name: Joe Dohn
      affiliation: Foo
      email: joe.bob@example.com
      social: https://social.example.com/joebob
      primary: true
  repositories:
    - name: Foo
      url: https://example.com/foobar/foo
      comment: |
        Foo is the core repo for FooBar.
    - name: Bar
      url: https://example.com/foobar/bar
      comment: |
        Bar is also part of the FooBar project.
  vulnerability-reporting:
    reports-accepted: true
    bug-bounty-available: true

repository:
  url: https://example.com/foobar/foo
  status: active
  accepts-change-request: true
  accepts-automated-change-request: true
  core-team:
    - name:        Alice White
      affiliation: Foo Bar
      email:       alicewhite@email.com
      social:      https://social.example.com/alicewhite
      primary:     true
  license:
    url: https://example.com/LICENSE
    expression: MIT
  security:
    assessments:
      self:
        comment: |
          Self assessment has not yet been completed.
